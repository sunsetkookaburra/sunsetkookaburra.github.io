<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>School Assessment Calculator</title>
	<link rel="stylesheet" href="../style/main.css">
	<link rel="stylesheet" href="../style/assessment.css">
</head>
<body>
	<header>
		<button>🗒</button>
		<h1>Assessment Calculator</h1>
		<button>💾</button>
	</header>
	<main>
		<article class="course">
			<h2 contenteditable="true">English Advanced</h2>
			<article class="task">
				<h3 contenteditable="true">Task 1 - Common Module</h3>
				<label class="mark">Mark: <input type="text"></label>
				<label class="outof">Out Of: <input type="text"></label>
				<label class="weight">Weight: <input type="text"></label>
			</article>
			<article class="task">
				<h3 contenteditable="true">Task 2 - Module A</h3>
			</article>
			<article class="task">
				<h3 contenteditable="true">Task 3 - Module B</h3>
			</article>
			<article class="task">
				<h3 contenteditable="true">Task 4 - Trials (Common, C)</h3>
			</article>
			<article class="total">
				<h3>Total</h3>
			</article>
		</article>
		<button class="new-course">➕</button>
	</main>
	<footer>
		(C) 2020 - Oliver Lenehan
	</footer>
</body>
</html>
